<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh Cho Em</title>
    <style>
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px; /* Tạo độ sâu không gian */
        }

        #ui {
            position: relative;
            transform-style: preserve-3d;
            /* Trái tim sẽ hơi nghiêng và xoay nhẹ để nhìn rõ khối 3D */
            transform: rotateX(15deg);
            animation: rotateHeart 15s infinite linear;
        }

        @keyframes rotateHeart {
            0% { transform: rotateX(15deg) rotateY(0deg); }
            100% { transform: rotateX(15deg) rotateY(360deg); }
        }

        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            /* Hiệu ứng đung đưa đặc trưng trong video của bạn */
            animation: horizontal 8000ms infinite alternate ease-in-out;
            animation-delay: var(--delay);
        }

        .love_word {
            position: absolute;
            color: #ea80b0;
            font-size: 1.4rem; /* Giữ nguyên size bạn muốn */
            text-shadow: 0 0 10px #fff, 0 0 20px #ea80b0;
            letter-spacing: 2px;
            white-space: nowrap;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            /* Kết hợp vị trí trái tim và độ nghiêng của video */
            transform: translate3d(var(--x), var(--y), var(--z)) rotateZ(-30deg);
        }

        @keyframes horizontal {
            from { transform: translateX(-40px) rotateY(-10deg); }
            to { transform: translateX(40px) rotateY(10deg); }
        }
    </style>
</head>
<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById('ui');
        const total = 60; // Số lượng dòng chữ vừa đủ để nhìn rõ và đẹp

        for (let i = 0; i < total; i++) {
            const container = document.createElement('div');
            container.className = 'love_horizontal';
            container.style.setProperty('--delay', `${i * -300}ms`);

            // Công thức toán học hình trái tim (Heart Curve)
            const t = (i / total) * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            // Tạo độ sâu Z để các dòng chữ bao quanh không gian
            const z = Math.cos(t * 2) * 50; 

            const word = document.createElement('div');
            word.className = 'love_word';
            word.innerText = 'I LOVE YOU'; 
            
            // Đưa các giá trị tính toán vào biến CSS
            word.style.setProperty('--x', `${x * 16}px`);
            word.style.setProperty('--y', `${y * 16}px`);
            word.style.setProperty('--z', `${z}px`);

            container.appendChild(word);
            ui.appendChild(container);
        }
    </script>
</body>
</html>
