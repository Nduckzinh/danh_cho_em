<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dành Cho Em</title>
    <style>
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        #ui {
            position: relative;
            transform-style: preserve-3d;
            /* Trái tim xoay nhẹ để thấy chiều sâu 3D như video */
            animation: rotate 20s infinite linear;
        }

        @keyframes rotate {
            from { transform: rotateY(0deg) rotateX(10deg); }
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        /* ĐOẠN CSS CỦA BẠN - Đã được fix để không đè lên tọa độ JS */
        #ui .love_word {
            position: absolute;
            color: #ea80b0;
            font-size: 1.4rem;
            /* Dùng biến --x, --y, --z để JS điều khiển vị trí hình trái tim */
            /* Nhưng vẫn giữ nguyên cái rotateZ(-30deg) như trong ảnh bạn gửi */
            transform: translate3d(var(--x), var(--y), var(--z)) rotateZ(-30deg);
            text-shadow: 0 0 10px #fff, 0 0 20px #ea80b0;
            letter-spacing: 2px;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        /* Hiệu ứng animation đung đưa y hệt code của bạn */
        #ui .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            animation: horizontal 10000ms infinite alternate ease-in-out;
            animation-delay: calc(var(--i) * -300ms);
        }

        @keyframes horizontal {
            from { transform: translateX(-30px); }
            to { transform: translateX(30px); }
        }
    </style>
</head>
<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById('ui');
        const total = 80; // Số lượng dòng chữ để hình trái tim dày dặn

        for (let i = 0; i < total; i++) {
            const container = document.createElement('div');
            container.className = 'love_horizontal';
            container.style.setProperty('--i', i);

            // Công thức hình trái tim chuẩn xác
            const t = (i / total) * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            const z = Math.sin(t * 2) * 30; // Độ sâu 3D

            const word = document.createElement('div');
            word.className = 'love_word';
            word.innerText = 'I LOVE YOU'; 

            // Đẩy tọa độ vào biến CSS
            word.style.setProperty('--x', `${x * 15}px`);
            word.style.setProperty('--y', `${y * 15}px`);
            word.style.setProperty('--z', `${z}px`);

            container.appendChild(word);
            ui.appendChild(container);
        }
    </script>
</body>
</html>
