<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dành Cho Nhi</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #0a0005; /* Nền đen pha chút sắc hồng tối cho sâu thẳm */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
            font-family: 'Dancing Script', cursive; /* Áp dụng font chữ */
        }

        #scene {
            position: relative;
            transform-style: preserve-3d;
            /* Hiệu ứng vừa xoay tròn 360 độ vừa bay lên bay xuống */
            animation: spin 15s linear infinite;
        }

        @keyframes spin {
            0% { transform: translateY(0px) rotateX(10deg) rotateY(0deg); }
            25% { transform: translateY(-15px) rotateX(15deg) rotateY(90deg); }
            50% { transform: translateY(0px) rotateX(10deg) rotateY(180deg); }
            75% { transform: translateY(15px) rotateX(5deg) rotateY(270deg); }
            100% { transform: translateY(0px) rotateX(10deg) rotateY(360deg); }
        }

        .text-item {
            position: absolute;
            color: #ea80b0; /* Màu hồng bạn chọn */
            font-size: 24px;
            white-space: nowrap;
            /* Đổ bóng 3 lớp tạo hiệu ứng đèn Neon phát sáng */
            text-shadow: 0 0 10px #ea80b0, 0 0 20px #ffb3d9, 0 0 40px #ea80b0;
            transform-style: preserve-3d;
            opacity: 0;
            animation: fadeIn 2s forwards; /* Hiệu ứng mờ ảo hiện ra lúc mới vào web */
        }

        @keyframes fadeIn {
            to { opacity: 0.9; }
        }

        /* Chữ trung tâm đập theo nhịp tim */
        .center-text {
            position: absolute;
            color: #fff;
            font-size: 60px;
            text-shadow: 0 0 15px #ea80b0, 0 0 30px #ea80b0, 0 0 50px #ea80b0;
            transform: translate(-50%, -50%);
            z-index: 1000;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(0.9); }
            to { transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>

    <div id="scene">
        <div class="center-text">Nhi ❤️</div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const textToRepeat = "Dinh love Nhi"; 
        const totalItems = 150; // Tăng số lượng chữ để trái tim dày và lung linh hơn

        for (let i = 0; i < totalItems; i++) {
            const el = document.createElement('div');
            el.className = 'text-item';
            el.innerText = textToRepeat;

            // Công thức toán học vẽ hình trái tim
            const t = (i / totalItems) * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            // Tạo chiều sâu ngẫu nhiên để chữ trông như đang bay quanh một khối cầu trái tim
            const depth = (Math.random() - 0.5) * 80; 
            const scale = Math.random() * 0.6 + 0.4; // Chữ to chữ nhỏ đan xen
            
            // Xếp các chữ vào không gian 3D
            el.style.transform = `
                translate3d(${x * 14}px, ${y * 14}px, ${depth}px) 
                rotateY(${Math.random() * 360}deg) 
                rotateZ(${(Math.random() - 0.5) * 20}deg)
                scale(${scale})
            `;
            
            // Giúp các chữ không hiện ra cùng 1 lúc mà lần lượt sáng lên
            el.style.animationDelay = `${Math.random() * 2}s`;

            scene.appendChild(el);
        }
    </script>
</body>
</html>
