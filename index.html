<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dành Cho Nhi</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #0a0005;
            height: 100vh;
            overflow: hidden;
            perspective: 1200px;
            font-family: 'Dancing Script', cursive;
        }

        /* --- FIX 1: Tách chữ Nhi ra lớp riêng, căn giữa tuyệt đối màn hình --- */
        #center-name {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 70px;
            text-shadow: 0 0 10px #ea80b0, 0 0 30px #ea80b0;
            z-index: 1000;
            animation: pulse 1.2s infinite alternate;
            pointer-events: none; /* Tránh lỗi đè chuột */
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(0.95); text-shadow: 0 0 10px #ea80b0, 0 0 20px #ea80b0; }
            to { transform: translate(-50%, -50%) scale(1.05); text-shadow: 0 0 15px #ea80b0, 0 0 40px #ffb3d9; }
        }

        /* --- FIX 2: Tối ưu khung cảnh 3D để giữ 60 FPS --- */
        #scene {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            animation: spin 15s linear infinite;
            /* Báo cho trình duyệt biết thuộc tính này sẽ thay đổi để ép dùng GPU */
            will-change: transform; 
        }

        @keyframes spin {
            0% { transform: rotateX(10deg) rotateY(0deg); }
            100% { transform: rotateX(10deg) rotateY(360deg); }
        }

        .text-item {
            position: absolute;
            top: 0;
            left: 0;
            color: #ea80b0;
            font-size: 24px;
            white-space: nowrap;
            /* Tối ưu render: Giảm từ 3 lớp shadow nặng xuống 2 lớp nhẹ hơn */
            text-shadow: 0 0 8px #ea80b0, 0 0 15px #ffb3d9;
            transform-style: preserve-3d;
            opacity: 0;
            animation: fadeIn 2s forwards;
            will-change: transform, opacity; /* Tối ưu phần cứng cho từng chữ */
        }

        @keyframes fadeIn {
            to { opacity: 0.85; }
        }
    </style>
</head>
<body>

    <div id="center-name">Nhi ❤️</div>

    <div id="scene"></div>

    <script>
        const scene = document.getElementById('scene');
        const textToRepeat = "Dinh love Nhi"; 
        
        // Cân bằng giữa "đẹp" và "mượt 60fps" -> 120 dòng là con số hoàn hảo
        const totalItems = 120; 

        for (let i = 0; i < totalItems; i++) {
            const el = document.createElement('div');
            el.className = 'text-item';
            el.innerText = textToRepeat;

            // Toán học tạo hình trái tim (thu nhỏ lại một chút để bao quanh chữ Nhi vừa vặn hơn)
            const t = (i / totalItems) * Math.PI * 2;
            const x = 14 * Math.pow(Math.sin(t), 3);
            const y = -(11 * Math.cos(t) - 4 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            const depth = (Math.random() - 0.5) * 60; 
            const scale = Math.random() * 0.5 + 0.5;
            
            // translate3d ép trình duyệt dùng tăng tốc phần cứng tốt hơn translate thường
            el.style.transform = `
                translate3d(${x * 16}px, ${y * 16}px, ${depth}px) 
                rotateY(${Math.random() * 360}deg) 
                rotateZ(${(Math.random() - 0.5) * 20}deg)
                scale(${scale})
            `;
            
            el.style.animationDelay = `${Math.random() * 1.5}s`;

            scene.appendChild(el);
        }
    </script>
</body>
</html>
